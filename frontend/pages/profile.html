<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Rental Platform</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">
  <div class="utility-bar">
    <a class="btn btn-secondary" data-back-dashboard href="../dashboards/owner.html">← Back to Dashboard</a>
</div>

  <main class="page-shell">
    <section class="page-card profile-card">
      <h1 class="section-title">Your Profile</h1>
      <p class="section-subtitle">Account details for the currently logged-in user.</p>
      <div id="profileDetails" class="profile-grid"></div>

      <form id="ownerProfileEditForm" class="form-grid" style="margin-top: 1rem;">
        <div>
          <label for="profilePhone">Phone</label>
          <input id="profilePhone" type="text" placeholder="Phone number" disabled />
        </div>
        <div>
          <label for="profileOwnerType">Owner Type</label>
          <select id="profileOwnerType" disabled>
            <option value="Local">Local</option>
            <option value="NRI">NRI</option>
          </select>
        </div>
        <div>
          <label for="profileCity">City</label>
          <input id="profileCity" type="text" placeholder="City" disabled />
        </div>
        <div class="full">
          <label for="profileAddress">Address</label>
          <input id="profileAddress" type="text" placeholder="Address" disabled />
        </div>
      </form>

      <div class="actions-row">
        <button id="editProfileBtn" class="btn btn-primary" type="button">Edit Profile</button>
        <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
      </div>
    </section>
  </main>

  <script type="module" src="../js/modules/profile.js"></script>

<script type="module" src="../js/modules/appShell.js"></script>
</body>
</html>
